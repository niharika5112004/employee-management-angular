<div class="add-user-container">
  <h2>Add New User</h2>

  <form #userForm="ngForm" (ngSubmit)="userForm.valid && addUser()">

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email:</label>
      <input 
        type="email"
        name="email"
        [(ngModel)]="email"
        #emailRef="ngModel"
        placeholder="Enter email"
        required
        email>

      <!-- Validation messages -->
      <div *ngIf="emailRef.invalid && emailRef.touched" style="color: red; font-size: 13px;">
        <div *ngIf="emailRef.errors?.['required']">
          Email is required
        </div>
        <div *ngIf="emailRef.errors?.['email']">
          Enter a valid email
        </div>
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>Password:</label>
      <input 
        type="password"
        name="password"
        [(ngModel)]="password"
        #passwordRef="ngModel"
        placeholder="Enter password"
        required
        minlength="6">

      <!-- Validation messages -->
      <div *ngIf="passwordRef.invalid && passwordRef.touched" style="color: red; font-size: 13px;">
        <div *ngIf="passwordRef.errors?.['required']">
          Password is required
        </div>
        <div *ngIf="passwordRef.errors?.['minlength']">
          Minimum 6 characters required
        </div>
      </div>
    </div>

    <!-- ROLE -->
    <div class="form-group">
      <label>Role:</label>
      <select 
        name="role"
        [(ngModel)]="role"
        #roleRef="ngModel"
        required>

        <option value="" disabled selected>Select role</option>
        <option value="employee">Employee</option>
        <option value="admin">Admin</option>
      </select>

      <!-- Validation messages -->
      <div *ngIf="roleRef.invalid && roleRef.touched" style="color: red; font-size: 13px;">
        Role is required
      </div>
    </div>

    <!-- BUTTON -->
    <button type="submit" [disabled]="userForm.invalid">
      Create User
    </button>

  </form>
</div>
